# Local Postgres 16 + pgvector for packages/db (started via `just db-up`).
# Credentials below are local-dev-only and never used outside this compose file;
# production connection strings come from $DATABASE_URL (see TOOLS.md).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: claimwatch
      POSTGRES_PASSWORD: claimwatch
      POSTGRES_DB: claimwatch
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U claimwatch']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
